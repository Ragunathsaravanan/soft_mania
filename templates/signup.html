{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm p-4">
                <h2 class="text-center mb-4">Sign Up</h2>
                <form method="POST">
                    {% csrf_token %}
                    <input type="text" name="name" placeholder="Full Name" class="form-control mb-3" required>
                    <input type="number" name="age" placeholder="Age" class="form-control mb-3" required>
                    <textarea name="address" placeholder="Address" class="form-control mb-3" rows="3" required></textarea>
                    <input type="email" name="email" placeholder="Email" class="form-control mb-3" required>
                    <input type="text" name="mobile" placeholder="Mobile" class="form-control mb-3" required>
                    <input type="password" name="password" placeholder="Password" class="form-control mb-3" required>
                    <button type="submit" class="btn btn-primary w-100">Sign Up</button>
                </form>
                <p class="mt-3 text-center">Already have an account? <a href="{% url 'login' %}">Login here</a>.</p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
