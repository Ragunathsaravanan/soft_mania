{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>Welcome, {{ request.session.user_name }}!</h2>
    <a href="{% url 'upload_file' %}" class="btn btn-success mb-3">Upload New File</a>
    {% if files %}
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>File</th>
                    <th>Type</th>
                    <th>Uploaded At</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for f in files %}
                <tr>
                    <td>{{ f.file.name }}</td>
                    <td>{{ f.file_type }}</td>
                    <td>{{ f.uploaded_at }}</td>
                    <td><a href="{% url 'download_file' f.id %}" class="btn btn-primary btn-sm">Download</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    {% else %}
        <p>No files uploaded yet.</p>
    {% endif %}
</div>
</body>
</html>
