{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload File</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="card p-4 shadow-sm" style="max-width: 500px; margin: auto;">
        <h2 class="mb-4">Upload File</h2>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <input type="file" name="file" class="form-control mb-3" required>
            <button type="submit" class="btn btn-primary w-100">Upload</button>
        </form>
        <p class="mt-3">Allowed file types: PDF, PNG, JPG, JPEG</p>
        <a href="{% url 'dashboard' %}" class="btn btn-secondary w-100">Back to Dashboard</a>
    </div>
</div>
</body>
</html>
